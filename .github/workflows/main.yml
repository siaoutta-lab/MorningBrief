name: MorningBrief

on:
  schedule:
    - cron: '0 23 * * *' # 每天曼谷/北京时间早上 6:00 自动运行
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run MorningBrief Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python reply.py

    # 【修复重点：将发件服务器完美切换为 Gmail 官方引擎】
    - name: Send MorningBrief Email
      uses: dawidd6/action-send-mail@v3
      with:
        # 正确配置 Gmail 发件服务器
        server_address: smtp.gmail.com
        server_port: 465
        # 自动读取你在 Secrets 存好的 Gmail 账号
        username: ${{ secrets.MAIL_USERNAME }}
        # 自动读取你在 Secrets 存好的 16 位 Google 应用专用密码 (neka fbas eszo xtxw)
        password: ${{ secrets.MAIL_PASSWORD }}
        # 邮件标题
        subject: 📊 MorningBrief | SEA Edition (Latest)
        # 同时发送到你的两个目标邮箱
        to: caisihao@asp.th.com,siaoutta@gmail.com
        # 发件人尊称
        from: AI News Editor <${{ secrets.MAIL_USERNAME }}>
        # 读取早报文本内容发送
        body: file://brief_output.txt
        # 确保中文排版不乱码
        convert_markdown: true
