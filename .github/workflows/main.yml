name: MorningBrief

on:
  schedule:
    - cron: '0 23 * * *'  # 每天曼谷/北京时间早上 6 点自动运行
  workflow_dispatch:      # 允许随时手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run MorningBrief Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python reply.py
