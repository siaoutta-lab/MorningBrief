name: Run Morning Brief

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '0 0 * * *' # 每天定时运行

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run MorningBrief Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 这一步是关键：把免费额度传给你的代码
        run: python reply.py
