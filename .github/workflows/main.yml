name: MorningBrief

on:
  schedule:
    # 0 2 代表世界标准时间（UTC）的 02:00，正好对应曼谷/北京时间的早上 09:00
    - cron: '0 2 * * *' 
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run MorningBrief Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python reply.py

    # 【发件引擎：Gmail | 收件人：3位】
    - name: Send MorningBrief Email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: 📊 MorningBrief | SEA Edition (Latest)
        # 已完美并列配置你的三个目标收件箱
        to: caisihao@asp.th.com,siaoutta@gmail.com,267247961@qq.com
        from: AI News Editor <${{ secrets.MAIL_USERNAME }}>
        body: file://brief_output.txt
        convert_markdown: true
