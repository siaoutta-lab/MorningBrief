name: Run Morning Brief

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '0 0 * * *' # 每天定时运行（可根据需要修改）

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run MorningBrief Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 核心：这里会把你的密钥传递给代码
        run: python reply.py
